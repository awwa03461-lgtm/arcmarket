  <path d="M7 24 L16 8 L25 24"
        fill="none"
        stroke="#E3A33A"
        stroke-width="3.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <path d="M11.4 18.6 H20.6"
        fill="none"
        stroke="#E3A33A"
        stroke-width="3.4"
        stroke-linecap="round"/>
</svg>
