<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Same mark as the sidebar, inverted for contrast at 16px:
       deep navy field, gold arc. Strokes are heavy on purpose —
       anything finer disappears in a browser tab. -->
